<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="panda">
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- ears -->
  <circle cx="168" cy="156" r="60" fill="#0f0f0f"/>
  <circle cx="344" cy="156" r="60" fill="#0f0f0f"/>
  <!-- face -->
  <circle cx="256" cy="276" r="150" fill="#f8fafc"/>
  <!-- eye patches -->
